name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag for the release (e.g. v1.0.1)"
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find latest successful Build workflow run
        id: find-run
        uses: actions/github-script@v7
        with:
          script: |
            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "build.yml",
              status: "success",
              per_page: 1,
            });
            if (runs.total_count === 0) {
              core.setFailed("No successful Build workflow run found. Run the Build workflow first.");
              return;
            }
            const run = runs.workflow_runs[0];
            core.setOutput("run_id", run.id);
            core.setOutput("run_number", run.run_number);

      - name: Download artifacts from Build run #${{ steps.find-run.outputs.run_number }}
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.find-run.outputs.run_id }}

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            name=$(basename "$dir")
            file=$(find "$dir" -type f | head -1)
            if [ -n "$file" ]; then
              ext="${file##*.}"
              if [ "$ext" = "exe" ]; then
                cp "$file" "release-assets/${name}.exe"
              else
                cp "$file" "release-assets/${name}"
              fi
              chmod +x "release-assets/${name}" 2>/dev/null || true
            fi
          done
          echo "Assets to upload:"
          ls -lh release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: TextGrid Labeler ${{ inputs.tag }}
          body: |
            ## TextGrid Labeler ${{ inputs.tag }}

            Auto-built from Build workflow run #${{ steps.find-run.outputs.run_number }}.

            See the [Build workflow](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ steps.find-run.outputs.run_id }}) for details.
          files: release-assets/*
          fail_on_unmatched_files: true
